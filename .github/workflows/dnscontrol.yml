name: DNSControl

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: dnscontrol
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  INWX_USER: ${{ secrets.INWX_USER }}
  INWX_PASSWORD: ${{ secrets.INWX_PASSWORD }}

jobs:
  dnscontrol:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check config
        uses: docker://ghcr.io/dnscontrol/dnscontrol:4.43.3
        with:
          args: check

      - name: Preview
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          docker run --rm -v "$PWD:/dns" \
            -e CLOUDFLARE_API_TOKEN -e INWX_USER -e INWX_PASSWORD \
            ghcr.io/dnscontrol/dnscontrol:4.43.3 preview | tee preview.txt

      - name: Comment preview on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### `dnscontrol preview`'
            echo '```'
            cat preview.txt
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --edit-last --create-if-none --body-file comment.md

      - name: Push
        if: github.event_name == 'push'
        uses: docker://ghcr.io/dnscontrol/dnscontrol:4.43.3
        with:
          args: push
